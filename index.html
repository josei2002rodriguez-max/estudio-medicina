<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedMaster Pro - Analítica de Estudio</title>
    <style>
        :root {
            --primary: #4a90e2; --bg: #f5f7fa; --card: #ffffff;
            --text: #2c3e50; --accent: #27ae60; --error: #e74c3c;
            --secondary: #7f8c8d; --highlight: #ebf4ff;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.4; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }
        .status-bar { text-align: center; font-size: 12px; color: var(--secondary); margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .card { 
            background: var(--card); padding: 20px 10px; border-radius: 16px; text-align: center;
            cursor: pointer; border: 2px solid transparent; transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-weight: 600;
        }
        .card:hover { transform: scale(1.02); border-color: var(--primary); }
        .card.selected { border-color: var(--accent); background: #f0fff4; }

        .setup-box { background: white; padding: 20px; border-radius: 16px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .topic-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        
        .btn { 
            display: block; width: 100%; padding: 16px; margin-top: 12px; border: none;
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-align: center; text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: white; color: var(--secondary); border: 1px solid var(--secondary); }

        /* Quiz UI */
        .quiz-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score-live { font-weight: bold; font-size: 14px; }
        .option-btn { 
            display: block; width: 100%; padding: 16px; margin: 10px 0; border: 2px solid #edf2f7;
            border-radius: 12px; background: white; text-align: left; font-size: 15px; cursor: pointer;
        }
        .option-btn.correct-show { border-color: var(--accent); background: #e6fffa; color: #155724; font-weight: bold; }
        .option-btn.wrong-show { border-color: var(--error); background: #fff5f5; color: #721c24; }
        .option-btn.inspecting { border-style: dotted; border-width: 3px; border-color: var(--primary); }

        .explanation { margin-top: 15px; padding: 15px; border-radius: 12px; font-size: 14px; border-left: 5px solid var(--primary); background: var(--highlight); display: none; }
        
        /* Resultados */
        .results-card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .percentage { font-size: 48px; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .weak-topics { text-align: left; background: #fff5f5; padding: 15px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">

    <div id="view-loading" class="view active">
        <h1>🩺 MedMaster</h1>
        <p style="text-align: center;">Cargando biblioteca...</p>
    </div>
    
    <div id="view-internado" class="view">
        <h1>¿Qué Internado estudias?</h1>
        <div id="internado-grid" class="grid"></div>
        <div class="status-bar" style="margin-top:20px;">Total preguntas cargadas: <span id="db-total">0</span></div>
    </div>

    <div id="view-setup" class="view">
        <h1 id="setup-title">Áreas</h1>
        <div id="area-grid" class="grid"></div>
        <div id="topic-config" class="setup-box" style="display:none;">
            <p><strong>Selecciona Tópicos:</strong></p>
            <div id="topic-list"></div>
            <div style="margin-top:20px;">
                <p>Preguntas disponibles: <strong id="total-count">0</strong></p>
                <input type="number" id="limit-input" placeholder="Cantidad (Vacio = todas)" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box;">
            </div>
            <button class="btn btn-primary" onclick="startQuiz()">Iniciar Sesión 🚀</button>
        </div>
        <button class="btn btn-secondary" onclick="showView('view-internado')">❮ Cambiar Internado</button>
    </div>

    <div id="view-quiz" class="view">
        <div class="quiz-nav">
            <button onclick="confirmExit()" style="background:none; border:none; font-size:24px; cursor:pointer;">🏠</button>
            <div class="score-live">
                <span style="color:var(--accent)">✅ <span id="live-good">0</span></span> | 
                <span style="color:var(--error)">❌ <span id="live-bad">0</span></span>
            </div>
            <div id="q-progress" style="font-size:12px; color:var(--secondary);"></div>
        </div>
        
        <h2 id="q-text"></h2>
        <div id="options-container"></div>
        <div id="explanation-box" class="explanation"></div>
        
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="prev-btn" class="btn btn-secondary" style="flex:1;" onclick="prevQuestion()">Anterior</button>
            <button id="next-btn" class="btn btn-primary" style="flex:2; display:none;" onclick="nextQuestion()">Siguiente ➔</button>
        </div>
    </div>

    <div id="view-results" class="view">
        <div class="results-card">
            <h1>Resumen de Sesión</h1>
            <div class="percentage" id="res-percent">0%</div>
            <p id="res-score-text"></p>
            
            <div id="weak-section" class="weak-topics" style="display:none;">
                <strong>⚠️ Temas a reforzar:</strong>
                <ul id="res-weak-list" style="margin: 10px 0; padding-left: 20px;"></ul>
            </div>

            <button class="btn btn-primary" id="btn-retry-failed" onclick="retryFailed()">Repetir solo las malas 🔄</button>
            <button class="btn btn-secondary" onclick="location.reload()">Finalizar y Salir</button>
        </div>
    </div>

</div>

<script>
    const archivosPreguntas = [
        'data/ped_cardio_1.json',
        'data/ped_nefro_1.json',
        'data/ped_certamen_1.json',
        'data/ped_certamen_2.json',
        'data/ped_certamen_3.json',
        'data/med_int_1.json'
    ];

    let database = [];
    let sessionQuestions = [];
    let currentIndex = 0;
    let stats = { correct: 0, wrong: 0, errorsByTopic: {} };

    async function cargarTodo() {
        for (const url of archivosPreguntas) {
            try {
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    database = [...database, ...data];
                }
            } catch (e) { console.error("Error cargando " + url); }
        }
        document.getElementById('db-total').innerText = database.length;
        renderInternados();
        showView(database.length > 0 ? 'view-internado' : 'view-loading');
    }

    function renderInternados() {
        const internados = [...new Set(database.map(q => q.internado))];
        const grid = document.getElementById('internado-grid');
        grid.innerHTML = "";
        internados.forEach(name => {
            const card = document.createElement('div');
            card.className = 'card'; card.innerText = name;
            card.onclick = () => selectInternado(name);
            grid.appendChild(card);
        });
    }

    let currentInternado = "";
    let selectedAreas = new Set();
    let selectedTopics = new Set();

    function selectInternado(name) {
        currentInternado = name;
        selectedAreas.clear(); selectedTopics.clear();
        document.getElementById('setup-title').innerText = name;
        const areas = [...new Set(database.filter(q => q.internado === name).map(q => q.area))];
        const grid = document.getElementById('area-grid'); grid.innerHTML = "";
        areas.forEach(area => {
            const card = document.createElement('div');
            card.className = 'card'; card.innerText = area;
            card.onclick = () => toggleArea(area, card);
            grid.appendChild(card);
        });
        showView('view-setup');
        document.getElementById('topic-config').style.display = "none";
    }

    function toggleArea(area, el) {
        if (selectedAreas.has(area)) { selectedAreas.delete(area); el.classList.remove('selected'); }
        else { selectedAreas.add(area); el.classList.add('selected'); }
        updateTopics();
    }

    function updateTopics() {
        const relevantQuestions = database.filter(q => q.internado === currentInternado && selectedAreas.has(q.area));
        const topics = [...new Set(relevantQuestions.map(q => q.topic))];
        const list = document.getElementById('topic-list'); list.innerHTML = "";
        document.getElementById('topic-config').style.display = selectedAreas.size > 0 ? "block" : "none";
        
        selectedTopics.clear();
        topics.forEach(t => {
            const div = document.createElement('div'); div.className = 'topic-item';
            div.innerHTML = `<input type="checkbox" checked id="t-${t}" onchange="toggleTopic('${t}')"> <label for="t-${t}">${t}</label>`;
            list.appendChild(div);
            selectedTopics.add(t);
        });
        updateCount();
    }

    function toggleTopic(t) { if (selectedTopics.has(t)) selectedTopics.delete(t); else selectedTopics.add(t); updateCount(); }
    
    function updateCount() {
        const count = database.filter(q => q.internado === currentInternado && selectedAreas.has(q.area) && selectedTopics.has(q.topic)).length;
        document.getElementById('total-count').innerText = count;
    }

    function startQuiz(customQuestions = null) {
        if (customQuestions) {
            sessionQuestions = customQuestions;
        } else {
            let pool = database.filter(q => q.internado === currentInternado && selectedAreas.has(q.area) && selectedTopics.has(q.topic));
            pool.sort(() => Math.random() - 0.5);
            const limit = document.getElementById('limit-input').value;
            if (limit) pool = pool.slice(0, parseInt(limit));
            sessionQuestions = pool.map(q => ({...q, answered: false, userChoiceIdx: null, isUserCorrect: null}));
        }
        
        if (sessionQuestions.length === 0) return alert("No hay preguntas con esos filtros.");
        
        currentIndex = 0;
        stats = { correct: 0, wrong: 0, errorsByTopic: {} };
        updateLiveScore();
        showView('view-quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = sessionQuestions[currentIndex];
        const textEl = document.getElementById('q-text');
        const progressEl = document.getElementById('q-progress');
        const metaEl = document.getElementById('q-meta');
        const optionsContainer = document.getElementById('options-container');
        const expBox = document.getElementById('explanation-box');

        // Limpiar
        textEl.innerText = q.text;
        progressEl.innerText = `${currentIndex + 1} / ${sessionQuestions.length}`;
        metaEl.innerText = `${q.area} • ${q.topic}`;
        optionsContainer.innerHTML = "";
        expBox.style.display = "none";
        
        // Botones de navegación
        document.getElementById('prev-btn').style.visibility = currentIndex > 0 ? "visible" : "hidden";
        document.getElementById('next-btn').style.display = q.answered ? "block" : "none";

        q.options.forEach((opt, idx) => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt.text;
            
            if (q.answered) {
                if (opt.isCorrect) b.classList.add('correct-show');
                if (idx === q.userChoiceIdx && !opt.isCorrect) b.classList.add('wrong-show');
                if (idx === q.userChoiceIdx) {
                    b.classList.add('inspecting');
                    showExplanation(opt);
                }
            }
            b.onclick = () => handleOptionClick(b, opt, q, idx);
            optionsContainer.appendChild(b);
        });
    }

    function handleOptionClick(btn, opt, q, idx) {
        if (!q.answered) {
            q.answered = true;
            q.userChoiceIdx = idx;
            q.isUserCorrect = opt.isCorrect;
            
            if (opt.isCorrect) stats.correct++;
            else {
                stats.wrong++;
                stats.errorsByTopic[q.topic] = (stats.errorsByTopic[q.topic] || 0) + 1;
            }
            updateLiveScore();
            document.getElementById('next-btn').style.display = "block";
            renderQuestion(); // Recargar para mostrar colores
        } else {
            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('inspecting'));
            btn.classList.add('inspecting');
            showExplanation(opt);
        }
    }

    function showExplanation(opt) {
        const box = document.getElementById('explanation-box');
        box.style.display = "block";
        box.innerHTML = `<strong>${opt.isCorrect ? '✅ Correcta' : '❌ Opción analizada'}:</strong><br>${opt.explanation}`;
    }

    function updateLiveScore() {
        document.getElementById('live-good').innerText = stats.correct;
        document.getElementById('live-bad').innerText = stats.wrong;
    }

    function nextQuestion() {
        if (currentIndex < sessionQuestions.length - 1) { currentIndex++; renderQuestion(); }
        else { finishSession(); }
    }

    function prevQuestion() { if (currentIndex > 0) { currentIndex--; renderQuestion(); } }

    function finishSession() {
        showView('view-results');
        const percent = Math.round((stats.correct / sessionQuestions.length) * 100);
        document.getElementById('res-percent').innerText = percent + "%";
        document.getElementById('res-score-text').innerText = `Puntaje final: ${stats.correct} / ${sessionQuestions.length}`;
        
        const weakList = document.getElementById('res-weak-list');
        weakList.innerHTML = "";
        const topicsSorted = Object.entries(stats.errorsByTopic).sort((a,b) => b[1] - a[1]);
        
        if (topicsSorted.length > 0) {
            document.getElementById('weak-section').style.display = "block";
            topicsSorted.slice(0, 3).forEach(([topic, count]) => {
                const li = document.createElement('li');
                li.innerText = `${topic} (${count} errores)`;
                weakList.appendChild(li);
            });
        } else {
            document.getElementById('weak-section').style.display = "none";
        }
        document.getElementById('btn-retry-failed').style.display = stats.wrong > 0 ? "block" : "none";
    }

    function retryFailed() {
        const failed = sessionQuestions.filter(q => !q.isUserCorrect);
        const resetFailed = failed.map(q => ({...q, answered: false, userChoiceIdx: null, isUserCorrect: null}));
        startQuiz(resetFailed);
    }

    function confirmExit() { if (confirm("¿Volver al menú? Se perderá el progreso actual.")) location.reload(); }
    function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    window.onload = cargarTodo;
</script>
</body>
</html>
